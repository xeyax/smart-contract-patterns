# Profile: Smart contract requirements

name: solidity
description: Requirements review for smart contract systems — uses 15 SC threat categories

pipeline:
  stage_1_sequential:
    - gen: overview
      writes: overview.md
    - gen: glossary
      writes: glossary.md

  stage_2_parallel:
    - gen: participant-matrix
      writes: participant-matrix.md
    - gen: state-action-matrix
      writes: state-action-matrix.md
    - gen: boundary-map
      writes: boundary-map.md
    - gen: dependency-graph
      writes: dependency-graph.md

  stage_3_parallel:
    - gen: nfr-coverage
      writes: nfr-coverage.md
    - gen: threat-coverage
      writes: threat-coverage.md
    - gen: consistency-report
      writes: consistency-report.md
    - gen: ambiguity-report
      writes: ambiguity-report.md

  stage_4_final:
    - gen: gaps
      writes: gaps.md

domain:
  system_class: smart-contract
  participant_categories: "Depositors/users, Privileged roles, Permissionless callers, External protocols"
  state_categories: "Normal, Paused, Emergency, Uninitialized"
  nfr_categories: "Security, Performance (gas), Compatibility (ERC standards), Upgradeability, Observability (events), Reliability"
