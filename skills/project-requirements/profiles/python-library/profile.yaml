# Profile: Python library requirements

name: python-library
description: Requirements review for Python (synchronous) libraries — uses library-specific threats

pipeline:
  stage_1_sequential:
    - gen: overview
      writes: overview.md
    - gen: glossary
      writes: glossary.md

  stage_2_parallel:
    - gen: participant-matrix
      writes: participant-matrix.md
    - gen: state-action-matrix
      writes: state-action-matrix.md
      optional: true
    - gen: boundary-map
      writes: boundary-map.md
    - gen: dependency-graph
      writes: dependency-graph.md

  stage_3_parallel:
    - gen: nfr-coverage
      writes: nfr-coverage.md
    - gen: threat-coverage
      writes: threat-coverage.md
    - gen: consistency-report
      writes: consistency-report.md
    - gen: ambiguity-report
      writes: ambiguity-report.md

  stage_4_final:
    - gen: gaps
      writes: gaps.md

domain:
  system_class: python-library
  participant_categories: "User code, Extension authors (provide implementations the library invokes through a documented contract), External resources (filesystem, subprocess, network, environment)"
  state_categories: "Open, Closed (after the use context ends)"
  nfr_categories: "API stability, Performance, Compatibility (supported runtime versions and platforms), Observability (diagnostic visibility), Reliability (resource lifecycle guarantees), Concurrency guarantees, Determinism"
