# Profile: Requirements Gathering
# Used with: /gather --profile requirements

format: items

output:
  data_file: docs/requirements.md
  log_file: docs/requirements-log.md

# Proposer subagent
proposer:
  ref: propose-requirements/SKILL.md
  count: 5

# Validator checks (each launched as separate subagent by gather)
validator:
  checks:
    - file: validate-requirements/checks/quality.md
      rules: [validate-requirements/rules/quality-rules.md]
      when: after_batch
    - file: validate-requirements/checks/completeness.md
      rules: [validate-requirements/rules/completeness-criteria.md]
      when: before_done
    - file: validate-requirements/checks/smart-contract.md
      rules: [validate-requirements/rules/smart-contract-threats.md]
      when: before_done

# Definition of Done
dod:
  - "No ERROR issues from checkpoint validation"
  - "Proposer returns no new items"

on_ready:
  ref: project-requirements/SKILL.md
  profile: solidity
  prompt: "Generate requirements artifacts and run cross-artifact review"

# Sections to fill at INIT (before first propose round)
init_sections:
  - name: Purpose
    prompt: |
      Based on the user's goal: {{GOAL}} — write a Purpose section covering:
      1. What the system/component does (one sentence).
      2. For whom (users, calling contracts, other components).
      3. Context: is it a standalone system, or part of a larger system?
         If part of a larger system — name the larger system and the component's role in it,
         and list external dependencies it interacts with (base protocols, oracles, sibling components).
      WHAT, not HOW. Plain language. Keep it short — 1–2 short paragraphs.

constraints: |
  Requirements describe WHAT, not HOW.
  No formulas, mechanism names, function signatures.
  Test: "could this be implemented differently?" If yes — it's WHAT.
  Each requirement must be singular, verifiable, and have acceptance criteria.
